<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAM Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="chat-container">

        <!-- HEADER -->
        <header>
            <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
            <h1>SLAM Chatbot</h1>
        </header>

        <!-- MESSAGE AREA -->
        <div id="messages-container">
            <div id="chat-area"></div>
        </div>

        <!-- INPUT AREA -->
        <div id="message-input-container">
            <input type="text" id="user-message-input" placeholder="Ask me another question..." />
            <button id="send-message-btn">Send</button>
        </div>

    </div>

    <!-- LOAD BOT LOGIC *FIRST* -->
    <script src="chatbot.js"></script>

    <!-- PAGE LOGIC -->
    <script>

        // Retrieve message passed from index.html
        const params = new URLSearchParams(window.location.search);
        const initialMessage = params.get("message");

        // Run AFTER chatbot.js is fully loaded
        window.onload = function () {

            // If user typed something on index.html → show it
            if (initialMessage) {
                userMessage(initialMessage);
                botReply(initialMessage);
            }

            // BUTTON SEND
            document.getElementById("send-message-btn").addEventListener("click", sendMessage);

            // ENTER SEND
            document.getElementById("user-message-input").addEventListener("keydown", function (e) {
                if (e.key === "Enter") sendMessage();
            });
        };


        // Sends a new message in chat.html
        function sendMessage() {
            let userInput = document.getElementById("user-message-input").value;

            if (userInput.trim() !== "") {
                userMessage(userInput);
                botReply(userInput);
                document.getElementById("user-message-input").value = "";
            }
        }

    </script>

</body>
</html>
