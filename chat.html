<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAM Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="chat-container">

        <!-- HEADER -->
        <header>
            <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
            <h1>SLAM Chatbot</h1>
        </header>

        <!-- MESSAGE AREA -->
        <div id="messages-container">
            <div id="chat-area"></div>
        </div>

        <!-- INPUT AREA -->
        <div id="message-input-container">
            <input type="text" id="user-message-input" placeholder="Ask me another question..." />
            <button id="send-message-btn">Send</button>
        </div>

    </div>

    <script>
        // GET INITIAL MESSAGE FROM index.html
        let urlParams = new URLSearchParams(window.location.search);
        let initialMessage = urlParams.get('message');

        // SEND INITIAL MESSAGE ON LOAD
        window.onload = function() {
            if (initialMessage) {
                userMessage(initialMessage);
                botReply(initialMessage);
            }
        };

        // SEND WITH BUTTON
        document.getElementById("send-message-btn").addEventListener("click", function() {
            sendUserMessage();
        });

        // SEND WITH ENTER
        document.getElementById("user-message-input").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendUserMessage();
            }
        });

        function sendUserMessage() {
            let userInput = document.getElementById("user-message-input").value;
            if (userInput.trim() !== "") {
                userMessage(userInput);
                botReply(userInput);
                document.getElementById("user-message-input").value = "";
            }
        }
    </script>

    <!-- IMPORTANT: LOAD CHATBOT LOGIC -->
    <script src="chatbot.js"></script>

</body>
</html>
