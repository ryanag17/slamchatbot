<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SLAM Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="chat-container">

    <header>
        <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
        <h1>SLAM Chatbot</h1>
    </header>

    <div id="messages-container">
        <div id="chat-area" aria-live="polite" role="log"></div>
    </div>

    <div id="message-input-container">
        <input type="text" id="user-message-input" placeholder="Ask me another question..." autocomplete="off" />
        <button id="send-message-btn">Send</button>
    </div>

</div>

<!-- Tesseract.js for browser OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
const chatArea = document.getElementById('chat-area');
const sendBtn = document.getElementById('send-message-btn');
const inputEl = document.getElementById('user-message-input');

const STORAGE_KEY = "slam_chat_history_v2";
const STORAGE_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

function formatTimestamp(date = new Date()) {
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    const yyyy = date.getFullYear();
    let hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    return `${mm}/${dd}/${yyyy}, ${hours}:${minutes} ${ampm}`;
}

function loadHistory() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { createdAt: Date.now(), messages: [] };
        const parsed = JSON.parse(raw);
        if (!parsed.createdAt || !Array.isArray(parsed.messages)) return { createdAt: Date.now(), messages: [] };

        if (Date.now() - parsed.createdAt > STORAGE_TTL_MS) {
            localStorage.removeItem(STORAGE_KEY);
            return { createdAt: Date.now(), messages: [] };
        }
        return parsed;
    } catch {
        return { createdAt: Date.now(), messages: [] };
    }
}

function saveHistory(history) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch {}
}

let historyState = loadHistory();

function appendMessage(sender, text, opts = {}) {
    const { isTypingPlaceholder = false, timestampOverride = null } = opts;

    const msgWrap = document.createElement('div');
    msgWrap.className = 'chat-message ' + (sender === 'user' ? 'user-message' : 'bot-message');

    const bubble = document.createElement('div');
    bubble.className = 'message-bubble ' + (sender === 'user' ? 'user-bubble' : 'bot-bubble');

    if (isTypingPlaceholder) {
        const dots = document.createElement('span');
        dots.className = 'typing-dots';
        dots.textContent = '· · ·';
        bubble.appendChild(dots);
    } else {
        if (text) {
            const textDiv = document.createElement('div');
            textDiv.textContent = text;
            bubble.appendChild(textDiv);
        }

        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.textContent = timestampOverride || formatTimestamp();
        bubble.appendChild(timestamp);
    }

    msgWrap.appendChild(bubble);
    chatArea.appendChild(msgWrap);
    chatArea.scrollTop = chatArea.scrollHeight;

    return { msgWrap, bubble };
}

function typeBotReply(text, typingSpeed = 35, after = null) {
    const { bubble } = appendMessage('bot', '', { isTypingPlaceholder: true });

    bubble.innerHTML = '';
    const typedDiv = document.createElement('div');
    typedDiv.className = 'typed-text';
    bubble.appendChild(typedDiv);

    let i = 0;
    function step() {
        if (i < text.length) {
            typedDiv.textContent += text.charAt(i);
            i++;
            chatArea.scrollTop = chatArea.scrollHeight;
            setTimeout(step, typingSpeed);
        } else {
            if (typeof after === "function") after(bubble);

            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = formatTimestamp();
            bubble.appendChild(timestamp);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    }
    step();
}

// -------------------- Python backend call --------------------
async function callPythonBackend(userText) {
    const res = await fetch("/api/respond", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: userText })
    });
    if (!res.ok) throw new Error("Backend error");
    return await res.json();
}

// -------------------- Map OCR + Star drawing --------------------
function drawStar(ctx, x, y, rOuter, rInner, points=5) {
    const step = Math.PI / points;
    ctx.save();
    ctx.beginPath();
    ctx.translate(x, y);
    ctx.moveTo(0, -rOuter);
    for (let i = 0; i < points; i++) {
        ctx.rotate(step);
        ctx.lineTo(0, -rInner);
        ctx.rotate(step);
        ctx.lineTo(0, -rOuter);
    }
    ctx.closePath();
    ctx.lineWidth = 6;
    ctx.strokeStyle = "rgba(0,0,0,0.85)";
    ctx.stroke();
    ctx.fillStyle = "rgba(255,215,0,0.95)";
    ctx.fill();
    ctx.restore();
}

async function renderMapWithStar(containerBubble, mapImageUrl, targetText) {
    const wrap = document.createElement("div");
    wrap.className = "map-wrap";

    const canvas = document.createElement("canvas");
    canvas.className = "map-canvas";
    wrap.appendChild(canvas);
    containerBubble.appendChild(wrap);

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = mapImageUrl;

    await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
    });

    // Make canvas match image resolution for accurate OCR coordinate mapping
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    // If no target provided, stop after showing map
    if (!targetText) return;

    // OCR the image to find bounding box for target (e.g., "219", "236E")
    let result;
    try {
        result = await Tesseract.recognize(img, "eng", {
            logger: () => {}
        });
    } catch (e) {
        // Still show map even if OCR fails
        const note = document.createElement("div");
        note.style.marginTop = "8px";
        note.style.fontSize = "13px";
        note.textContent = "I couldn’t automatically locate that number on the map, but here’s the correct floor map.";
        containerBubble.appendChild(note);
        return;
    }

    const target = String(targetText).toUpperCase();
    const words = (result?.data?.words || []);
    let best = null;

    for (const w of words) {
        const txt = String(w.text || "").replace(/\s+/g, "").toUpperCase();
        if (!txt) continue;

        // exact match preferred
        if (txt === target) {
            best = w;
            break;
        }

        // sometimes OCR drops letters or splits: allow contains match
        if (txt.includes(target) || target.includes(txt)) {
            // pick the tighter bounding box if multiple
            if (!best) best = w;
            else {
                const a = (best.bbox.x1 - best.bbox.x0) * (best.bbox.y1 - best.bbox.y0);
                const b = (w.bbox.x1 - w.bbox.x0) * (w.bbox.y1 - w.bbox.y0);
                if (b < a) best = w;
            }
        }
    }

    if (!best || !best.bbox) {
        const note = document.createElement("div");
        note.style.marginTop = "8px";
        note.style.fontSize = "13px";
        note.textContent = `I found the right floor map, but couldn’t spot “${target}” automatically. The number may be too small for OCR.`;
        containerBubble.appendChild(note);
        return;
    }

    const { x0, y0, x1, y1 } = best.bbox;
    const cx = (x0 + x1) / 2;
    const cy = (y0 + y1) / 2;

    // draw star slightly above center so it doesn't cover text fully
    drawStar(ctx, cx, cy - 12, 34, 14, 5);
}

// -------------------- Main chat flow --------------------
async function showUserThenBot(userText) {
    const userTs = formatTimestamp();
    appendMessage('user', userText, { timestampOverride: userTs });

    historyState.messages.push({ sender: "user", text: userText, ts: Date.now() });
    saveHistory(historyState);

    let payload;
    try {
        payload = await callPythonBackend(userText);
    } catch (e) {
        payload = { text: "Backend is not responding. Make sure Flask is running.", map: null };
    }

    const replyText = payload?.text || "I'm not sure I understand — could you try asking in a different way?";
    const mapObj = payload?.map || null;

    typeBotReply(replyText, 35, async (bubble) => {
        if (mapObj && mapObj.image) {
            try {
                await renderMapWithStar(bubble, mapObj.image, mapObj.target);
            } catch {
                // ignore map rendering errors, keep reply text
            }
        }
    });

    historyState.messages.push({ sender: "bot", text: replyText, map: mapObj, ts: Date.now() });
    saveHistory(historyState);
}

// -------------------- restore chat on refresh --------------------
function renderHistory() {
    chatArea.innerHTML = "";
    for (const m of historyState.messages) {
        const ts = formatTimestamp(new Date(m.ts || Date.now()));
        const { bubble } = appendMessage(m.sender === "user" ? "user" : "bot", m.text || "", { timestampOverride: ts });

        // re-render maps for bot messages if present
        if (m.sender === "bot" && m.map && m.map.image) {
            // best-effort: redraw map with star
            renderMapWithStar(bubble, m.map.image, m.map.target).catch(()=>{});
        }
    }
    chatArea.scrollTop = chatArea.scrollHeight;
}

function sendFromInput() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    showUserThenBot(text);
    inputEl.focus();
}

sendBtn.addEventListener('click', sendFromInput);
inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendFromInput();
});

// -------------------- initial message handling --------------------
window.addEventListener('load', () => {
    renderHistory();

    const initial = sessionStorage.getItem("slam_initial_message");
    if (initial) {
        sessionStorage.removeItem("slam_initial_message");
        showUserThenBot(initial);
    }
});
</script>

</body>
</html>
