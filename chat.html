<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLAM Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="chat-container">
    <header>
      <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
      <h1>SLAM Chatbot</h1>
    </header>

    <main id="chat-area"></main>

    <div id="suggestions" class="suggestions"></div>

    <footer>
      <input id="user-input" type="text" placeholder="Type your message..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </footer>
  </div>

<script>
const chatArea = document.getElementById("chat-area");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const suggestionsEl = document.getElementById("suggestions");

// If page is served on :8080, same-origin is fine.
// If page is served on :80 (or anything else), send API to :8080.
const API_BASE =
  (window.location.port === "8080")
    ? ""
    : `${window.location.protocol}//${window.location.hostname}:8080`;

function appendBubble(sender, text) {
  const div = document.createElement("div");
  div.className = "bubble " + sender;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function renderSuggestions(list) {
  suggestionsEl.innerHTML = "";
  if (!Array.isArray(list) || list.length === 0) return;

  list.forEach((s) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "suggestion-chip";
    btn.textContent = s;
    btn.onclick = () => {
      input.value = s;
      input.focus();
    };
    suggestionsEl.appendChild(btn);
  });
}

async function callBackend(text) {
  const res = await fetch(`${API_BASE}/api/respond`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  if (!res.ok) {
    const t = await res.text().catch(() => "");
    throw new Error(`HTTP ${res.status} ${t}`);
  }

  return await res.json();
}

async function sendMessage(textOverride) {
  const text = (typeof textOverride === "string")
    ? textOverride.trim()
    : (input.value || "").trim();

  if (!text) return;

  if (typeof textOverride !== "string") input.value = "";
  appendBubble("user", text);

  let data;
  try {
    data = await callBackend(text);
  } catch (e) {
    console.error("API error:", e);
    appendBubble("bot", "Backend is not responding. Make sure Flask is running.");
    return;
  }

  const reply = (data && data.text) ? data.text : "I'm not sure I understand — could you try asking in a different way?";
  const imgUrl = (data && data.image_url) ? data.image_url : null;
  const sugg = (data && Array.isArray(data.suggestions)) ? data.suggestions : [];

  const botBubble = appendBubble("bot", reply);

  if (imgUrl) {
    const fullImgUrl = imgUrl.startsWith("http") ? imgUrl : `${API_BASE}${imgUrl}`;
    const img = document.createElement("img");
    img.src = fullImgUrl;
    img.alt = "Map";
    img.className = "map-image";
    botBubble.appendChild(document.createElement("br"));
    botBubble.appendChild(img);
  }

  renderSuggestions(sugg);
}

sendBtn.addEventListener("click", () => sendMessage());
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

// AUTO-SEND the message coming from index.html
(function autoSendFromIndex() {
  const initial = sessionStorage.getItem("slam_initial_message");
  if (initial) {
    sessionStorage.removeItem("slam_initial_message");
    sendMessage(initial);
  }
})();
</script>
</body>
</html>
