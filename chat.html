<!-- frontend/chat.html  (FULL FILE) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SLAM Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="chat-container">

    <header>
        <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
        <h1>SLAM Chatbot</h1>
    </header>

    <main id="chat-area"></main>

    <div id="suggestions" class="suggestions"></div>

    <footer>
        <input id="user-input" type="text" placeholder="Type your message..." autocomplete="off"/>
        <button id="send-btn">Send</button>
    </footer>
</div>

<script>
const chatArea = document.getElementById("chat-area");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const suggestionsEl = document.getElementById("suggestions");

const STORAGE_KEY = "slam_chat_history_v1";
const STORAGE_TTL_MS = 24 * 60 * 60 * 1000;

function formatTimestamp(d = new Date()) {
    const pad = (n) => String(n).padStart(2, "0");
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function loadHistory() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { createdAt: Date.now(), messages: [] };

        const parsed = JSON.parse(raw);
        if (!parsed.createdAt || !Array.isArray(parsed.messages)) {
            return { createdAt: Date.now(), messages: [] };
        }

        if (Date.now() - parsed.createdAt > STORAGE_TTL_MS) {
            localStorage.removeItem(STORAGE_KEY);
            return { createdAt: Date.now(), messages: [] };
        }

        return parsed;
    } catch {
        return { createdAt: Date.now(), messages: [] };
    }
}

function saveHistory(state) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch {}
}

let historyState = loadHistory();

function appendMessage(sender, text, opts = {}) {
    const bubble = document.createElement("div");
    bubble.className = "bubble " + sender;

    const msg = document.createElement("div");
    msg.className = "msg";
    msg.textContent = text || "";
    bubble.appendChild(msg);

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = opts.timestampOverride || formatTimestamp();
    bubble.appendChild(ts);

    chatArea.appendChild(bubble);
    chatArea.scrollTop = chatArea.scrollHeight;

    return bubble;
}

function typeBotReply(text, speedMs, afterDone) {
    const bubble = appendMessage("bot", "");
    const msg = bubble.querySelector(".msg");
    let i = 0;

    function step() {
        if (i <= text.length) {
            msg.textContent = text.slice(0, i);
            i++;
            chatArea.scrollTop = chatArea.scrollHeight;
            setTimeout(step, speedMs);
        } else {
            if (afterDone) afterDone(bubble);
        }
    }
    step();
}

async function callPythonBackend(userText) {
    const res = await fetch("/api/respond", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: userText })
    });

    if (!res.ok) {
        const t = await res.text().catch(() => "");
        throw new Error("Backend error: " + res.status + " " + t);
    }
    return await res.json();
}

function renderSuggestions(list) {
    suggestionsEl.innerHTML = "";
    if (!Array.isArray(list) || list.length === 0) return;

    for (const s of list) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "suggestion-chip";
        btn.textContent = s;
        btn.addEventListener("click", () => {
            input.value = s;
            input.focus();
        });
        suggestionsEl.appendChild(btn);
    }
}

async function showUserThenBot(userText) {
    const userTs = formatTimestamp();
    appendMessage("user", userText, { timestampOverride: userTs });

    historyState.messages.push({ sender: "user", text: userText, ts: Date.now() });
    saveHistory(historyState);

    let payload;
    try {
        payload = await callPythonBackend(userText);
    } catch (e) {
        payload = { text: "Backend is not responding. Make sure Flask is running.", image_url: null, suggestions: [] };
    }

    const replyText = payload?.text || "I'm not sure I understand — could you try asking in a different way?";
    const imgUrl = payload?.image_url || null;
    const sugg = payload?.suggestions || [];

    typeBotReply(replyText, 25, (bubble) => {
        if (imgUrl) {
            const img = document.createElement("img");
            img.className = "map-image";
            img.src = imgUrl;
            img.alt = "Map";
            bubble.appendChild(img);
        }
        renderSuggestions(sugg);
    });

    historyState.messages.push({ sender: "bot", text: replyText, image_url: imgUrl, suggestions: sugg, ts: Date.now() });
    saveHistory(historyState);
}

function renderHistory() {
    chatArea.innerHTML = "";
    for (const m of historyState.messages) {
        const ts = formatTimestamp(new Date(m.ts || Date.now()));
        const bubble = appendMessage(m.sender, m.text, { timestampOverride: ts });
        if (m.sender === "bot" && m.image_url) {
            const img = document.createElement("img");
            img.className = "map-image";
            img.src = m.image_url;
            img.alt = "Map";
            bubble.appendChild(img);
        }
    }
    // show most recent suggestions if present
    for (let i = historyState.messages.length - 1; i >= 0; i--) {
        const m = historyState.messages[i];
        if (m.sender === "bot" && Array.isArray(m.suggestions) && m.suggestions.length) {
            renderSuggestions(m.suggestions);
            break;
        }
    }
}

function sendMessage() {
    const text = (input.value || "").trim();
    if (!text) return;
    input.value = "";
    showUserThenBot(text);
}

sendBtn.addEventListener("click", sendMessage);
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
});

renderHistory();
</script>
</body>
</html>
