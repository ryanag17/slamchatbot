<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLAM Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="chat-container">
    <header>
      <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
      <h1>SLAM Chatbot</h1>
    </header>

    <div id="messages-container">
      <div id="chat-area"></div>

      <!-- Suggestions go under chat -->
      <div id="suggestions" style="padding: 10px 4px; display:flex; gap:10px; flex-wrap:wrap;"></div>
    </div>

    <div id="message-input-container">
      <input id="user-message-input" type="text" placeholder="Type your message..." autocomplete="off"/>
      <button id="send-message-btn">Send</button>
    </div>
  </div>

<script>
  const chatArea = document.getElementById("chat-area");
  const input = document.getElementById("user-message-input");
  const sendBtn = document.getElementById("send-message-btn");
  const suggestionsEl = document.getElementById("suggestions");

  // If the page is served on :8080, same-origin is fine.
  // If served on :80, call backend on :8080 (GCP common setup).
  const API_BASE =
    (window.location.port === "8080")
      ? ""
      : `${window.location.protocol}//${window.location.hostname}:8080`;

  function formatTimestamp(d = new Date()) {
    const pad = (n) => String(n).padStart(2, "0");
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function renderSuggestions(list) {
    suggestionsEl.innerHTML = "";
    if (!Array.isArray(list) || list.length === 0) return;

    list.forEach((s) => {
      const btn = document.createElement("button");
      btn.type = "button";
      // Use your existing button styling
      btn.id = "send-btn";
      btn.style.padding = "10px 14px";
      btn.style.borderRadius = "18px";
      btn.textContent = s;
      btn.addEventListener("click", () => {
        input.value = s;
        input.focus();
      });
      suggestionsEl.appendChild(btn);
    });
  }

  function addMessageBubble(sender, text) {
    const wrapper = document.createElement("div");
    wrapper.className = `chat-message ${sender === "user" ? "user-message" : "bot-message"}`;

    const bubble = document.createElement("div");
    bubble.className = `message-bubble ${sender === "user" ? "user-bubble" : "bot-bubble"}`;

    const typed = document.createElement("span");
    typed.className = "typed-text";
    typed.textContent = text || "";
    bubble.appendChild(typed);

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = formatTimestamp();
    bubble.appendChild(ts);

    wrapper.appendChild(bubble);
    chatArea.appendChild(wrapper);
    chatArea.scrollTop = chatArea.scrollHeight;

    return { wrapper, bubble, typed };
  }

  function typeBotText(targetEl, fullText, speed = 18) {
    return new Promise((resolve) => {
      let i = 0;
      function step() {
        targetEl.textContent = fullText.slice(0, i);
        i++;
        chatArea.scrollTop = chatArea.scrollHeight;
        if (i <= fullText.length) setTimeout(step, speed);
        else resolve();
      }
      step();
    });
  }

  async function callBackend(text) {
    const res = await fetch(`${API_BASE}/api/respond`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    if (!res.ok) {
      const t = await res.text().catch(() => "");
      throw new Error(`HTTP ${res.status} ${t}`);
    }
    return await res.json();
  }

  async function sendMessage(textOverride) {
    const text = (typeof textOverride === "string") ? textOverride.trim() : (input.value || "").trim();
    if (!text) return;

    if (typeof textOverride !== "string") input.value = "";

    addMessageBubble("user", text);

    let payload;
    try {
      payload = await callBackend(text);
    } catch (e) {
      console.error("API error:", e);
      addMessageBubble("bot", "Backend is not responding. Make sure Flask is running.");
      return;
    }

    const replyText = payload?.text || "I'm not sure I understand — could you try asking in a different way?";
    const imgUrl = payload?.image_url || null;
    const sugg = Array.isArray(payload?.suggestions) ? payload.suggestions : [];

    const bot = addMessageBubble("bot", "");
    await typeBotText(bot.typed, replyText, 16);

    // image (ensure correct host/port)
    if (imgUrl) {
      const fullImgUrl = imgUrl.startsWith("http") ? imgUrl : `${API_BASE}${imgUrl}`;
      const img = document.createElement("img");
      img.className = "map-image";
      img.src = fullImgUrl;
      img.alt = "Map";
      bot.bubble.appendChild(img);
    }

    renderSuggestions(sugg);
  }

  sendBtn.addEventListener("click", () => sendMessage());
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  // Auto-send message passed from index.html
  (function autoSendFromIndex() {
    const initial = sessionStorage.getItem("slam_initial_message");
    if (initial) {
      sessionStorage.removeItem("slam_initial_message");
      sendMessage(initial);
    }
  })();
</script>
</body>
</html>
