<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SLAM Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="chat-container">

    <header>
        <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
        <h1>SLAM Chatbot</h1>
    </header>

    <div id="messages-container">
        <div id="chat-area" aria-live="polite" role="log"></div>
    </div>

    <div id="message-input-container">
        <input type="text" id="user-message-input" placeholder="Ask me another question..." autocomplete="off" />
        <button id="send-message-btn">Send</button>
    </div>

</div>

<!-- LOAD chatbot.js FIRST -->
<script src="backend/chatbot.js"></script>

<script>
const chatArea = document.getElementById('chat-area');
const sendBtn = document.getElementById('send-message-btn');
const inputEl = document.getElementById('user-message-input');

// Wait until chatbot.js loaded JSON
function ensureDataLoaded(callback) {
    if (window.__museumLoaded) return callback();
    const check = setInterval(() => {
        if (window.__museumLoaded) {
            clearInterval(check);
            callback();
        }
    }, 50);
}

// Create a message bubble
function appendMessage(sender, text, isTyping = false) {
    const msgWrap = document.createElement("div");
    msgWrap.className = "chat-message " + (sender === "user" ? "user-message" : "bot-message");

    const bubble = document.createElement("div");
    bubble.className = "message-bubble " + (sender === "user" ? "user-bubble" : "bot-bubble");

    if (isTyping) {
        bubble.innerHTML = "<span class='typing-dots'>· · ·</span>";
    } else {
        bubble.innerText = text;
    }

    const timestamp = document.createElement("div");
    timestamp.className = "timestamp";
    timestamp.innerText = new Date().toLocaleString('en-US', {
        month: "2-digit",
        day: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
    });

    bubble.appendChild(timestamp);
    msgWrap.appendChild(bubble);
    chatArea.appendChild(msgWrap);
    chatArea.scrollTop = chatArea.scrollHeight;

    return bubble;
}

// Typing animation
function typeBotReply(text) {
    const bubble = appendMessage("bot", "", true);
    bubble.innerHTML = "";

    const typedDiv = document.createElement("div");
    bubble.appendChild(typedDiv);

    let i = 0;
    function step() {
        if (i < text.length) {
            typedDiv.innerText += text[i++];
            chatArea.scrollTop = chatArea.scrollHeight;
            setTimeout(step, 20);
        } else {
            const timestamp = document.createElement("div");
            timestamp.className = "timestamp";
            timestamp.innerText = new Date().toLocaleString();
            bubble.appendChild(timestamp);
        }
    }
    step();
}

function showUserThenBot(msg) {
    appendMessage("user", msg);
    ensureDataLoaded(() => {
        const reply = processInput(msg);
        setTimeout(() => typeBotReply(reply), 300);
    });
}

// Get first message from URL
const params = new URLSearchParams(window.location.search);
const initialMessage = params.get("message");

window.addEventListener("load", () => {
    if (initialMessage) showUserThenBot(initialMessage);
});

function sendFromInput() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    showUserThenBot(text);
}

sendBtn.addEventListener("click", sendFromInput);
inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter") sendFromInput();
});
</script>

</body>
</html>
