<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAM Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="chat-container">
        <!-- Header with logo and title -->
        <header>
            <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
            <h1>SLAM Chatbot</h1>
        </header>

        <!-- Welcome message area -->
        <div id="welcome-container">
            <h2>Welcome to the SLAM Chatbot</h2>
            <p>What peaks your curiosity today?</p>
            <div id="input-container">
                <input type="text" id="user-input" placeholder="Ask me anything about SLAM..." />
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Event listener for sending the first message
        document.getElementById("send-btn").addEventListener("click", function() {
            let userInput = document.getElementById("user-input").value;
            if (userInput.trim() !== "") {
                // Send to chat.html with the message
                window.location.href = "chat.html?message=" + encodeURIComponent(userInput);
            }
        });

        // Allow sending messages by pressing Enter
        document.getElementById("user-input").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                let userInput = document.getElementById("user-input").value;
                if (userInput.trim() !== "") {
                    // Send to chat.html with the message
                    window.location.href = "chat.html?message=" + encodeURIComponent(userInput);
                }
            }
        });
    </script>
</body>
</html>
