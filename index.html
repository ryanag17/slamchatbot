<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAM Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="chat-container">
        <!-- Header with logo and title -->
        <header>
            <img src="SLAM_Logo.png" alt="SLAM Logo" id="logo">
            <h1>SLAM Chatbot</h1>
        </header>

        <!-- Welcome message area -->
        <div id="welcome-container">
            <h2>Welcome to the SLAM Chatbot</h2>
            <p>What peaks your curiosity today?</p>
            <div id="input-container">
                <input type="text" id="user-input" placeholder="Ask me anything about SLAM..." />
                <button id="send-btn">Send</button>
            </div>
        </div>

        <!-- Chat window where conversation happens (hidden initially) -->
        <div id="messages-container" class="hidden">
            <div id="chat-area"></div>
            <div id="message-input-container">
                <input type="text" id="user-message-input" placeholder="Ask me another question..." />
                <button id="send-message-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="backend/chatbot.js"></script>
    <script>
        // Event listener for sending the first message
        document.getElementById("send-btn").addEventListener("click", function() {
            let userInput = document.getElementById("user-input").value;
            if (userInput.trim() !== "") {
                userMessage(userInput);  // Display the user's message
                botReply(userInput);     // Let the bot respond
            }
            document.getElementById("user-input").value = ""; // Clear the input field
            document.getElementById("welcome-container").style.display = 'none'; // Hide the welcome screen
            document.getElementById("messages-container").classList.remove("hidden"); // Show chat area
        });

        // Allow sending messages by pressing Enter
        document.getElementById("user-input").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                let userInput = document.getElementById("user-input").value;
                if (userInput.trim() !== "") {
                    userMessage(userInput);  // Display the user's message
                    botReply(userInput);     // Let the bot respond
                }
                document.getElementById("user-input").value = ""; // Clear the input field
                document.getElementById("welcome-container").style.display = 'none'; // Hide the welcome screen
                document.getElementById("messages-container").classList.remove("hidden"); // Show chat area
            }
        });

        // Event listener for sending further messages
        document.getElementById("send-message-btn").addEventListener("click", function() {
            let userInput = document.getElementById("user-message-input").value;
            if (userInput.trim() !== "") {
                userMessage(userInput);  // Display the user's message
                botReply(userInput);     // Let the bot respond
            }
            document.getElementById("user-message-input").value = ""; // Clear the input field
        });

        // Allow sending further messages by pressing Enter
        document.getElementById("user-message-input").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                let userInput = document.getElementById("user-message-input").value;
                if (userInput.trim() !== "") {
                    userMessage(userInput);  // Display the user's message
                    botReply(userInput);     // Let the bot respond
                }
                document.getElementById("user-message-input").value = ""; // Clear the input field
            }
        });
    </script>
</body>
</html>
